<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitação recebida — Eficiência Engenharia</title>
  <meta name="description" content="Recebemos sua solicitação de orçamento. A equipe da Eficiência Engenharia entra em contato pelo seu WhatsApp.">
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- ==================== GOOGLE TAG ==================== -->
  <!-- A tag do Google (gtag.js) para Analytics + conversão do Ads entra AQUI.
       Mesmo snippet do index.html. Substituir quando o ID (G-XXXX / AW-XXXX) estiver disponível. -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0E0E0C;
      --bone: #F2EFE9;
      --moss: #B5C18E;
      --rust: #C8501A;
      --steel: #6B6B66;
      --line: rgba(255,255,255,0.08);
      --pad-x: 64px;
    }
    @media (max-width: 1023px) { :root { --pad-x: 48px; } }
    @media (max-width: 767px)  { :root { --pad-x: 24px; } }

    body {
      font-family: 'Geist', sans-serif;
      background: var(--ink);
      color: var(--bone);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ==================== NAV ==================== */
    .nav {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 var(--pad-x);
      border-bottom: 1px solid var(--line);
    }
    .nav-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--bone);
    }
    .nav-logo-text {
      font-family: 'Geist', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
    }

    /* ==================== CONTEÚDO ==================== */
    .wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px var(--pad-x);
    }
    .card {
      max-width: 560px;
      width: 100%;
    }
    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 28px;
      display: block;
    }
    .check {
      width: 56px;
      height: 56px;
      border-radius: 100px;
      border: 1px solid var(--moss);
      color: var(--moss);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 28px;
    }
    h1 {
      font-family: 'Geist', sans-serif;
      font-weight: 600;
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }
    h1 em {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      color: var(--moss);
    }
    .lead {
      font-family: 'Geist', sans-serif;
      font-weight: 300;
      font-size: 17px;
      line-height: 1.6;
      color: var(--steel);
      max-width: 440px;
      margin-bottom: 36px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }
    .btn-primary-lg, .btn-secondary-lg {
      font-family: 'Geist', sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: var(--bone);
      padding: 16px 32px;
      border-radius: 100px;
      text-decoration: none;
    }
    .btn-primary-lg {
      background: var(--rust);
      border: none;
      transition: opacity 200ms;
    }
    .btn-primary-lg:hover { opacity: 0.88; }
    .btn-secondary-lg {
      background: transparent;
      border: 1px solid var(--line);
      transition: border-color 200ms;
    }
    .btn-secondary-lg:hover { border-color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <!-- ==================== NAV ==================== -->
  <nav class="nav" role="navigation" aria-label="Principal">
    <a href="/" class="nav-logo" aria-label="Eficiência Engenharia — página inicial">
      <svg width="22" height="28" viewBox="0 0 44 54" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="color:var(--bone)">
        <rect x="0" y="0" width="7" height="54" fill="currentColor"/>
        <rect x="0" y="0" width="34" height="7" fill="currentColor"/>
        <rect x="0" y="23.5" width="23" height="7" fill="var(--moss)"/>
        <rect x="0" y="47" width="34" height="7" fill="currentColor"/>
      </svg>
      <span class="nav-logo-text">Eficiência Engenharia</span>
    </a>
  </nav>

  <!-- ==================== CONTEÚDO ==================== -->
  <main class="wrap">
    <div class="card">
      <span class="eyebrow">// SOLICITAÇÃO RECEBIDA</span>
      <div class="check" aria-hidden="true">✓</div>
      <h1>Recebemos sua <em>solicitação</em>.</h1>
      <p class="lead">Obrigado. Em breve a equipe da Eficiência Engenharia entra em contato pelo seu WhatsApp para conversar sobre a sua obra.</p>
      <div class="actions">
        <a href="/" class="btn-secondary-lg">← Voltar ao site</a>
        <a href="https://wa.me/5522981311843" class="btn-primary-lg" target="_blank" rel="noopener">Chamar no WhatsApp →</a>
      </div>
    </div>
  </main>
</body>
</html>
